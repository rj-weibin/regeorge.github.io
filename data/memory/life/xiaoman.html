<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 小满的冒险手账 🌟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-[#f0f9ff] text-slate-800 min-h-screen p-4 md:p-8 font-sans">
    <div id="app" class="max-w-2xl mx-auto pb-20">
        
        <div class="bg-white rounded-3xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-400">
            <h1 class="text-3xl font-black mb-3 text-slate-800 tracking-wide">👦 小满的冒险手账</h1>
            <p class="text-slate-500 text-sm font-medium">记录每一次勇敢与成长的瞬间</p>
            <div class="mt-8 flex justify-center gap-12">
                <div class="text-center">
                    <div class="text-5xl font-black text-blue-500">{{ totalPoints }}</div>
                    <div class="text-sm text-slate-400 font-bold mt-2 uppercase tracking-widest">累计磁贴</div>
                </div>
                <div class="text-center">
                    <div class="text-5xl font-black text-emerald-500">{{ records.length }}</div>
                    <div class="text-sm text-slate-400 font-bold mt-2 uppercase tracking-widest">成就次数</div>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-8 justify-center">
            <button v-for="cat in categories" :key="cat" 
                    @click="activeCategory = cat"
                    :class="['px-5 py-2 rounded-full text-sm font-bold transition-all duration-300', 
                             activeCategory === cat ? 'bg-blue-500 text-white shadow-lg scale-105' : 'bg-white text-slate-500 hover:bg-slate-100']">
                {{ cat }}
            </button>
        </div>

        <div class="space-y-4">
            <div v-for="record in filteredRecords" :key="record.id" 
                 class="bg-white p-5 rounded-2xl shadow-sm flex items-start gap-5 transition-all duration-300 hover:shadow-md hover:-translate-y-1 border border-transparent hover:border-blue-100 group">
                <div class="text-4xl bg-slate-50 p-3 rounded-2xl group-hover:scale-110 transition-transform">{{ record.icon }}</div>
                <div class="flex-1 mt-1">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">{{ record.date }}</span>
                        <span class="text-sm font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full">+{{ record.points }} 磁贴</span>
                    </div>
                    <p class="text-slate-700 text-base leading-relaxed font-medium">{{ record.text }}</p>
                </div>
            </div>
            
            <div v-if="filteredRecords.length === 0" class="text-center text-slate-400 py-10 font-medium">
                暂无该类别的记录哦～
            </div>
        </div>

        <button @click="triggerConfetti" title="给小满撒花庆祝！"
                class="fixed bottom-10 right-10 bg-gradient-to-r from-blue-500 to-indigo-500 text-white w-16 h-16 rounded-full shadow-xl text-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all">
            ✨
        </button>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const activeCategory = ref('全部');
                const categories = ['全部', '🗺️ 探险', '🛑 自律', '❤️ 暖心', '🛡️ 勇敢', '🌬️ 特殊'];
                
                // 将小满的日常记录结构化
                const rawData = [
                    { id: 1, date: '03-17', text: '小满今天早上主动起床', points: 1, category: '🛑 自律', icon: '⏰' },
                    { id: 2, date: '03-10', text: '小满，我祝福你像风一样自由，我们做的一切，是想帮助你找到你自己', points: 5, category: '🌬️ 特殊', icon: '🌬️' },
                    { id: 3, date: '03-08', text: '小满给妈妈分享了美味的奇趣蛋，妈妈特别开心', points: 1, category: '❤️ 暖心', icon: '🥚' },
                    { id: 4, date: '03-08', text: '昨天晚上睡觉前自己看完了很多很多的书，然后就自己主动睡觉了', points: 1, category: '🛑 自律', icon: '📚' },
                    { id: 5, date: '02-22', text: '承诺不玩手机、电视和游戏，如果耍赖就打屁股打到哭', points: 1, category: '🛑 自律', icon: '📺' },
                    { id: 6, date: '02-20', text: '完成了一项探险任务，把水瓶子放到了充满危险的红色大手上面', points: 1, category: '🗺️ 探险', icon: '🏔️' },
                    { id: 7, date: '02-20', text: '小满又探险了新的路线', points: 1, category: '🗺️ 探险', icon: '🗺️' },
                    { id: 8, date: '02-20', text: '绕了一大圈子去探险，又跑到了家里', points: 1, category: '🗺️ 探险', icon: '🏃' },
                    { id: 9, date: '02-19', text: '按照约定走到了终点', points: 1, category: '🗺️ 探险', icon: '🏁' },
                    { id: 10, date: '02-19', text: '第二次探险没有摔跟头，非常棒', points: 2, category: '🗺️ 探险', icon: '✨' },
                    { id: 11, date: '02-19', text: '探险成功，但是摔了一跤', points: 1, category: '🗺️ 探险', icon: '🩹' },
                    { id: 12, date: '02-18', text: '小满出去探险成功', points: 1, category: '🗺️ 探险', icon: '🏕️' },
                    { id: 13, date: '02-18', text: '头被车门撞了，勇敢的很，没有哭', points: 1, category: '🛡️ 勇敢', icon: '🛡️' },
                    { id: 14, date: '02-18', text: '帮妈妈打水了', points: 1, category: '❤️ 暖心', icon: '💧' },
                    { id: 15, date: '02-17', text: '主动给妈妈分享零食', points: 1, category: '❤️ 暖心', icon: '🍪' },
                    { id: 16, date: '02-17', text: '看完小猫小狗主动交还手机', points: 1, category: '🛑 自律', icon: '📱' },
                    { id: 17, date: '02-16', text: '看手机主动的停了下来', points: 1, category: '🛑 自律', icon: '📵' },
                    { id: 18, date: '02-15', text: '魏小满吃零食的时候，主动停下来', points: 1, category: '🛑 自律', icon: '🍬' },
                    { id: 19, date: '02-13', text: '去高铁站接爸爸，还一眼就找到爸爸在哪里了', points: 1, category: '❤️ 暖心', icon: '🚄' },
                    { id: 20, date: '02-11', text: '主动帮妈妈扫地', points: 2, category: '❤️ 暖心', icon: '🧹' }
                ];

                const records = ref(rawData);

                // 自动计算总分
                const totalPoints = computed(() => {
                    return records.value.reduce((sum, record) => sum + record.points, 0);
                });

                // 筛选逻辑
                const filteredRecords = computed(() => {
                    if (activeCategory.value === '全部') return records.value;
                    return records.value.filter(r => r.category === activeCategory.value);
                });

                // 右下角按钮的撒花彩蛋效果
                const triggerConfetti = () => {
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                    });
                };

                return {
                    activeCategory,
                    categories,
                    records,
                    filteredRecords,
                    totalPoints,
                    triggerConfetti
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
