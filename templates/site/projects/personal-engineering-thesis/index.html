<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal Engineering Thesis · reGeorge</title>
  <style>
    :root{--bg:#f2eee7;--paper:#fffdf8;--panel:#faf6ee;--ink:#2d2924;--muted:#756c61;--line:#ded5c8;--coral:#a8583f;--teal:#226b68;--blue:#35689a;--shadow:0 18px 46px rgba(71,51,30,.09);--serif:Georgia,"Songti SC",serif;--sans:"Segoe UI Variable Text","PingFang SC","Microsoft YaHei",sans-serif;--mono:Consolas,monospace}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);font-family:var(--sans);background:radial-gradient(circle at 8% 0%,#ead9c7 0,transparent 30%),linear-gradient(180deg,#f8f4ec,#eee7dc);line-height:1.7}.shell{width:min(1240px,calc(100% - 32px));margin:auto;padding:22px 0 64px}.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 0 22px;border-bottom:1px solid var(--line)}.topbar a{color:var(--muted);text-decoration:none}.topbar a:hover{color:var(--coral)}.brand{font:700 1.2rem var(--serif)}.hero{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(280px,.8fr);gap:24px;margin-top:24px;padding:40px 42px;background:linear-gradient(145deg,rgba(255,253,248,.97),rgba(249,242,231,.9));border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;position:relative}.hero:after{content:"";position:absolute;width:360px;height:360px;right:-120px;top:-170px;border-radius:50%;background:radial-gradient(circle,#d8b39d88,transparent 68%);pointer-events:none}.eyebrow{color:var(--coral);font:700 .76rem var(--mono);letter-spacing:.12em;text-transform:uppercase}.hero h1{max-width:780px;margin:12px 0 14px;font:700 clamp(2.2rem,5vw,4.5rem)/1 var(--serif);letter-spacing:-.03em}.subtitle{max-width:760px;margin:0;color:var(--muted);font-size:1.08rem}.status-row,.hero-meta,.tags{display:flex;flex-wrap:wrap;gap:8px}.status-row{margin-top:20px}.pill{padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.64);color:var(--muted);font-size:.78rem}.pill.accent{color:var(--coral);border-color:#c99c8a}.signal{margin:22px 0 0;padding:16px 18px;border-left:4px solid var(--teal);background:rgba(231,240,237,.68);font:700 1.03rem/1.65 var(--serif)}.model-card{align-self:stretch;padding:22px;border:1px solid var(--line);border-radius:20px;background:rgba(255,250,242,.76);position:relative;z-index:1}.model-label{color:var(--muted);font:700 .72rem var(--mono);letter-spacing:.1em}.model-card h2{margin:8px 0 16px;font:700 1.35rem var(--serif)}.model-stack{display:grid;gap:8px}.model-node{padding:11px 13px;border-radius:12px;background:var(--paper);border:1px solid var(--line);font-weight:700}.model-node span{display:block;color:var(--muted);font-size:.76rem;font-weight:400}.model-arrow{text-align:center;color:var(--coral);line-height:1}.jumpbar{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}.jumpbar a{padding:7px 11px;border-radius:10px;background:rgba(255,255,255,.64);border:1px solid var(--line);color:var(--muted);text-decoration:none;font-size:.82rem}.jumpbar a:hover{color:var(--coral);border-color:#c99c8a}.page-grid{display:grid;grid-template-columns:210px minmax(0,1fr);gap:24px;align-items:start}.rail{position:sticky;top:18px;display:grid;gap:12px}.rail-card,.panel{background:linear-gradient(145deg,rgba(255,253,248,.96),rgba(249,242,231,.9));border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}.rail-card{padding:16px}.rail-title{margin:0 0 10px;color:var(--muted);font:700 .72rem var(--mono);letter-spacing:.1em}.rail nav{display:grid;gap:4px}.rail nav a{padding:7px 9px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:.84rem}.rail nav a:hover{background:#f1e4d8;color:var(--coral)}.rail-note{color:var(--muted);font-size:.82rem}.content{min-width:0}.section{margin-bottom:24px;scroll-margin-top:18px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-bottom:11px}.section h2{margin:0;font:700 1.6rem var(--serif)}.section-head p{margin:0;color:var(--muted);font-size:.86rem}.panel{padding:25px}.claim-grid,.metric-grid,.thesis-grid,.case-grid,.asset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.claim-card,.metric,.thesis-card,.case-card,.asset-card{padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:15px}.claim-card .label,.metric small{color:var(--coral);font-size:.75rem;font-weight:700;letter-spacing:.06em}.claim-card p{margin:8px 0 0;font-size:.93rem}.metric strong{display:block;color:var(--coral);font:700 1.85rem var(--serif)}.metric span{display:block;font-weight:700}.metric small{display:block;margin-top:4px;color:var(--muted);font-weight:400;letter-spacing:0}.timeline{display:grid;gap:10px}.timeline-item{display:grid;grid-template-columns:42px minmax(0,1fr);gap:14px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:15px}.timeline-mark{width:32px;height:32px;display:grid;place-items:center;border-radius:50%;background:var(--teal);color:#fff;font:700 .78rem var(--mono)}h3{margin:0 0 6px;font:700 1.08rem var(--serif)}.timeline-item p,.thesis-card p,.case-card p,.asset-card p{margin:5px 0;font-size:.9rem}.muted{color:var(--muted)}.detail{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:.82rem}.tag{display:inline-block;margin:0 5px 4px 0;padding:3px 7px;border-radius:999px;background:#e7f0ed;color:var(--teal);font-size:.74rem}.thesis-grid{grid-template-columns:repeat(2,1fr)}.thesis-card{position:relative;padding-top:25px}.thesis-num{position:absolute;right:16px;top:13px;color:#c99c8a;font:700 1.2rem var(--mono)}.thesis-card b{color:var(--teal)}.case-grid{grid-template-columns:repeat(2,1fr)}.case-card{position:relative}.level{position:absolute;right:16px;top:15px;color:var(--coral);font:700 1rem var(--mono)}.case-card ul,.panel ul{padding-left:20px;margin:10px 0 0}.case-card li,.panel li{margin:4px 0;font-size:.86rem}.asset-grid{grid-template-columns:repeat(2,1fr)}.asset-card h3{font-size:.98rem}.gate{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0 18px}.gate-step{padding:13px 9px;text-align:center;background:#f1e4d8;border:1px solid #dfc9b8;border-radius:11px;font-size:.82rem}.gate-step:not(:last-child):after{content:"→";position:absolute;margin-left:10px;color:var(--coral)}.warning{padding:16px 18px;background:#fff4e5;border-left:4px solid #c57b2f;border-radius:10px;font-size:.9rem}.warning strong{color:#965b19}.footer{margin-top:30px;text-align:center;color:var(--muted);font-size:.8rem}@media(max-width:900px){.page-grid{grid-template-columns:1fr}.rail{position:static;grid-template-columns:1fr 1fr}.rail-card:first-child{grid-column:1/-1}.rail nav{display:flex;flex-wrap:wrap}.rail-note{font-size:.8rem}}@media(max-width:700px){.hero{grid-template-columns:1fr;padding:28px 24px}.claim-grid,.metric-grid,.asset-grid,.thesis-grid,.case-grid{grid-template-columns:1fr}.gate{grid-template-columns:1fr}.gate-step:not(:last-child):after{content:"↓";display:block;position:static;margin:2px 0 0}.section-head{display:block}.section-head p{margin-top:4px}.shell{width:min(100% - 22px,1240px)}}
  </style>
</head>
<body>
  <main class="shell">
    <nav class="topbar"><a class="brand" href="../../index.html">reGeorge · Personal AI OS</a><a href="../../index.html">返回首页</a></nav>
    <div id="app" class="panel" style="margin-top:24px;text-align:center;color:var(--muted)">正在读取工程论事实……</div>
    <p class="footer">事实源：data/projects/personal-engineering-thesis.json · 页面由 build-site.mjs 生成</p>
  </main>
  <script>
    const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const list=items=>(items||[]).map(item=>`<li>${esc(item)}</li>`).join('');
    const tags=items=>(items||[]).map(item=>`<span class="tag">${esc(item)}</span>`).join('');
    const paragraph=(label,value)=>`<p><b>${esc(label)}：</b>${esc(value)}</p>`;
    function render(data){
      const metrics=data.metrics.map(item=>`<div class="metric"><strong>${esc(item.value)}</strong><span>${esc(item.label)}</span><small>${esc(item.qualification)}</small></div>`).join('');
      const shifts=data.thinkingShifts.map((item,index)=>`<article class="timeline-item"><div class="timeline-mark">${index+1}</div><div><h3>${esc(item.title)}</h3>${paragraph('洞见',item.insight)}${paragraph('判断',item.decision)}<div class="detail"><b>证据资产：</b>${tags(item.evidence)}</div></div></article>`).join('');
      const theses=data.engineeringTheses.map((item,index)=>`<article class="thesis-card"><span class="thesis-num">0${index+1}</span><h3>${esc(item.title)}</h3>${paragraph('Insight',item.insight)}${paragraph('Decision',item.decision)}${paragraph('Agent role',item.agentRole)}${paragraph('Impact',item.impact)}</article>`).join('');
      const cases=data.featuredCases.map(item=>`<article class="case-card"><span class="level">${esc(item.level)}</span><h3>${esc(item.title)}</h3>${paragraph('Insight',item.insight)}${paragraph('Decision',item.decision)}${paragraph('Impact',item.impact)}<ul>${list(item.evidence)}</ul></article>`).join('');
      const assets=data.assets.map(item=>`<article class="asset-card"><h3>${esc(item.name)}</h3><p>${esc(item.meaning)}</p></article>`).join('');
      const gate=data.automationAdmission.steps.map(item=>`<div class="gate-step">${esc(item)}</div>`).join('');
      document.querySelector('#app').outerHTML=`
        <header class="hero"><div><div class="eyebrow">Career asset · Insight → Decision → Impact</div><h1>${esc(data.title)}</h1><p class="subtitle">${esc(data.subtitle)}</p><div class="status-row"><span class="pill accent">状态：${esc(data.status)}</span><span class="pill">最后整理：${esc(data.updatedAt)}</span><span class="pill">主页面候选：S 级案例</span></div><blockquote class="signal">${esc((data.originalWords?.[0]||'').replace(/^>\s*/,''))}</blockquote></div><aside class="model-card"><div class="model-label">OPERATING MODEL</div><h2>判断如何变成资产</h2><div class="model-stack"><div class="model-node">Insight<span>看见真正的问题</span></div><div class="model-arrow">↓</div><div class="model-node">Decision<span>选择边界与路径</span></div><div class="model-arrow">↓</div><div class="model-node">Impact<span>验证并形成复用</span></div></div></aside></header>
        <nav class="jumpbar"><a href="#thesis">核心主张</a><a href="#shifts">思维转向</a><a href="#principles">四条工程论</a><a href="#cases">代表案例</a><a href="#gate">自动化准入</a></nav>
        <div class="page-grid"><aside class="rail"><div class="rail-card"><p class="rail-title">ON THIS PAGE</p><nav><a href="#thesis">01 · 核心主张</a><a href="#shifts">02 · 思维转向</a><a href="#principles">03 · 工程论</a><a href="#cases">04 · 代表案例</a><a href="#assets">05 · 工程资产</a><a href="#gate">06 · 准入卡点</a></nav></div><div class="rail-card"><p class="rail-title">判定方式</p><p class="rail-note">只保留由个人意图主导、经过纠偏、落进资产并被真实验证的内容。</p></div></aside><div class="content">
          <section class="section" id="thesis"><div class="section-head"><h2>核心主张</h2><p>规模是背景，证据是锚点</p></div><div class="claim-grid"><article class="claim-card"><span class="label">INSIGHT</span><p>${esc(data.thesis.insight)}</p></article><article class="claim-card"><span class="label">DECISION</span><p>${esc(data.thesis.decision)}</p></article><article class="claim-card"><span class="label">IMPACT</span><p>${esc(data.thesis.impact)}</p></article></div></section>
          <section class="section" id="metrics"><div class="section-head"><h2>阶段性规模</h2><p>不单独作为价值证明</p></div><div class="metric-grid">${metrics}</div></section>
          <section class="section" id="shifts"><div class="section-head"><h2>思维转向</h2><p>从完成脚本到设计系统</p></div><div class="timeline">${shifts}</div></section>
          <section class="section" id="principles"><div class="section-head"><h2>四条工程论</h2><p>判断落地后的长期规则</p></div><div class="thesis-grid">${theses}</div></section>
          <section class="section" id="cases"><div class="section-head"><h2>代表案例</h2><p>Insight → Decision → Impact → Evidence</p></div><div class="case-grid">${cases}</div></section>
          <section class="section" id="assets"><div class="section-head"><h2>持续工作的工程资产</h2><p>跨项目、跨周期、跨上下文保持连续</p></div><div class="asset-grid">${assets}</div></section>
          <section class="section" id="gate"><div class="section-head"><h2>${esc(data.automationAdmission.title)}</h2><p>当前状态：${esc(data.automationAdmission.status)}</p></div><div class="panel"><div class="gate">${gate}</div><div class="warning"><strong>停止规则：</strong>${esc(data.automationAdmission.stopRule)}</div></div></section>
          <section class="section" id="boundary"><div class="section-head"><h2>探索与边界</h2><p>不把 Agent 执行量包装成成果</p></div><div class="panel"><ul>${list(data.boundaries)}</ul></div></section>
        </div></div>`;
    }
    fetch('../../data/personal-engineering-thesis.json').then(response=>{if(!response.ok)throw new Error('personal engineering thesis data load failed');return response.json()}).then(render).catch(error=>{document.querySelector('#app').innerHTML=`事实源读取失败：${esc(error.message)}`});
  </script>
</body>
</html>
