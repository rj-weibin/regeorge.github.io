<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal Engineering Thesis · reGeorge</title>
  <style>
    :root{--bg:#f3efe8;--paper:#fffdf8;--panel:#faf6ee;--ink:#2d2924;--muted:#756c61;--line:#ded5c8;--accent:#a8583f;--teal:#226b68;--shadow:0 18px 46px rgba(71,51,30,.09);--serif:Georgia,"Songti SC",serif;--sans:"Segoe UI Variable Text","PingFang SC","Microsoft YaHei",sans-serif;--mono:Consolas,monospace}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:var(--sans);background:radial-gradient(circle at 8% 0%,#ead9c7 0,transparent 30%),linear-gradient(180deg,#f8f4ec,#eee7dc);line-height:1.7}.shell{width:min(1180px,calc(100% - 30px));margin:auto;padding:24px 0 60px}.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 0 22px;border-bottom:1px solid var(--line)}.brand{font:700 1.2rem var(--serif);letter-spacing:.02em}.topbar a{color:var(--muted);text-decoration:none}.topbar a:hover{color:var(--accent)}.hero,.panel{background:linear-gradient(145deg,rgba(255,253,248,.96),rgba(249,242,231,.9));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.hero{margin-top:24px;padding:38px 42px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:260px;height:260px;right:-70px;top:-100px;border-radius:50%;background:radial-gradient(circle,#d8b39d99,transparent 68%);pointer-events:none}.eyebrow{color:var(--accent);font:700 .78rem var(--mono);letter-spacing:.11em;text-transform:uppercase}.hero h1{max-width:780px;margin:10px 0 12px;font:700 clamp(2rem,5vw,3.8rem)/1.12 var(--serif)}.hero .subtitle{max-width:760px;margin:0;color:var(--muted);font-size:1.08rem}.status{display:inline-block;margin-top:20px;padding:4px 10px;border:1px solid #c99c8a;border-radius:999px;color:var(--accent);font-size:.82rem}.claim{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}.claim-card{padding:18px;border-radius:15px;background:#fffaf2;border:1px solid var(--line)}.label{display:block;margin-bottom:6px;color:var(--accent);font-size:.78rem;font-weight:700;letter-spacing:.06em}.claim-card p{margin:0;font-size:.94rem}.section{margin-top:24px}.section h2{margin:0 0 12px;font:700 1.55rem var(--serif)}.section-intro{margin:-4px 0 14px;color:var(--muted)}.panel{padding:26px}.metric-grid,.case-grid,.asset-grid,.thesis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.metric{padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px}.metric strong{display:block;color:var(--accent);font:700 1.8rem var(--serif)}.metric span{display:block;font-weight:700}.metric small{display:block;margin-top:5px;color:var(--muted);font-size:.78rem}.timeline{display:grid;gap:12px}.timeline-item{display:grid;grid-template-columns:38px 1fr;gap:15px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px}.timeline-mark{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--teal);color:white;font:700 .8rem var(--mono)}h3{margin:0 0 7px;font:700 1.08rem var(--serif)}.micro{margin:0;color:var(--muted);font-size:.92rem}.detail{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:.91rem}.detail b{color:var(--teal)}.thesis-card,.case-card,.asset-card{padding:20px;background:var(--panel);border:1px solid var(--line);border-radius:16px}.thesis-card{grid-column:span 2}.thesis-card p,.case-card p,.asset-card p{margin:7px 0;font-size:.92rem}.thesis-card b,.case-card b{color:var(--teal)}.tag{display:inline-block;margin:0 6px 6px 0;padding:3px 8px;border-radius:999px;background:#e7f0ed;color:var(--teal);font-size:.76rem}.case-grid{grid-template-columns:repeat(2,1fr)}.case-card{position:relative}.level{position:absolute;right:16px;top:16px;color:var(--accent);font:700 1rem var(--mono)}.case-card ul,.panel ul{padding-left:20px;margin:10px 0 0}.case-card li,.panel li{margin:4px 0;font-size:.9rem}.gate{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:18px 0}.gate-step{padding:14px 10px;text-align:center;background:#f1e4d8;border:1px solid #dfc9b8;border-radius:12px;font-size:.84rem}.gate-step:after{content:"→";position:absolute;margin:0 0 0 12px;color:var(--accent)}.gate-step:last-child:after{display:none}.warning{padding:17px 20px;background:#fff4e5;border-left:4px solid #c57b2f;border-radius:10px}.warning strong{color:#965b19}.footer{margin-top:30px;color:var(--muted);font-size:.82rem;text-align:center}.loading{padding:40px;text-align:center;color:var(--muted)}@media(max-width:800px){.claim,.metric-grid,.thesis-grid{grid-template-columns:1fr}.case-grid{grid-template-columns:1fr}.thesis-card{grid-column:auto}.gate{grid-template-columns:1fr}.gate-step:after{content:"↓";display:block;position:static;margin:2px 0 0}.gate-step:last-child:after{display:none}.hero{padding:28px 24px}.panel{padding:20px}}
  </style>
</head>
<body>
  <main class="shell">
    <nav class="topbar"><a class="brand" href="../../index.html">reGeorge · Personal AI OS</a><a href="../../index.html">返回首页</a></nav>
    <div id="app" class="loading">正在读取工程论事实……</div>
    <p class="footer">事实源：data/projects/personal-engineering-thesis.json · 页面由 build-site.mjs 生成</p>
  </main>
  <script>
    const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const list=items=>(items||[]).map(item=>`<li>${esc(item)}</li>`).join('');
    const tags=items=>(items||[]).map(item=>`<span class="tag">${esc(item)}</span>`).join('');
    const paragraph=(label,value)=>`<p><b>${esc(label)}：</b>${esc(value)}</p>`;
    function render(data){
      const metrics=data.metrics.map(item=>`<div class="metric"><strong>${esc(item.value)}</strong><span>${esc(item.label)}</span><small>${esc(item.qualification)}</small></div>`).join('');
      const shifts=data.thinkingShifts.map((item,index)=>`<article class="timeline-item"><div class="timeline-mark">${index+1}</div><div><h3>${esc(item.title)}</h3>${paragraph('洞见',item.insight)}${paragraph('判断',item.decision)}<div class="detail"><b>证据资产：</b>${tags(item.evidence)}</div></div></article>`).join('');
      const theses=data.engineeringTheses.map(item=>`<article class="thesis-card"><h3>${esc(item.title)}</h3>${paragraph('Insight',item.insight)}${paragraph('Decision',item.decision)}${paragraph('Agent role',item.agentRole)}${paragraph('Impact',item.impact)}</article>`).join('');
      const cases=data.featuredCases.map(item=>`<article class="case-card"><span class="level">${esc(item.level)}</span><h3>${esc(item.title)}</h3>${paragraph('Insight',item.insight)}${paragraph('Decision',item.decision)}${paragraph('Impact',item.impact)}<ul>${list(item.evidence)}</ul></article>`).join('');
      const assets=data.assets.map(item=>`<article class="asset-card"><h3>${esc(item.name)}</h3><p>${esc(item.meaning)}</p></article>`).join('');
      const gate=data.automationAdmission.steps.map(item=>`<div class="gate-step">${esc(item)}</div>`).join('');
      document.querySelector('#app').innerHTML=`
        <header class="hero"><div class="eyebrow">Career asset · Insight → Decision → Impact</div><h1>${esc(data.title)}</h1><p class="subtitle">${esc(data.subtitle)}</p><span class="status">状态：${esc(data.status)} · 最后整理：${esc(data.updatedAt)}</span><div class="claim"><div class="claim-card"><span class="label">核心洞见</span><p>${esc(data.thesis.insight)}</p></div><div class="claim-card"><span class="label">关键判断</span><p>${esc(data.thesis.decision)}</p></div><div class="claim-card"><span class="label">形成的价值</span><p>${esc(data.thesis.impact)}</p></div></div></header>
        <section class="section"><h2>成果判定门槛</h2><div class="panel"><p class="section-intro">只把由个人意图主导、被纠偏、落进资产并被验证的内容纳入主页面。</p><ul>${list(data.evidenceGate)}</ul></div></section>
        <section class="section"><h2>规模是背景，证据是锚点</h2><div class="metric-grid">${metrics}</div></section>
        <section class="section"><h2>思维转向</h2><p class="section-intro">这条线索记录工作方式如何从“完成脚本”转向“设计能持续运行的工程系统”。</p><div class="timeline">${shifts}</div></section>
        <section class="section"><h2>四条工程论</h2><div class="thesis-grid">${theses}</div></section>
        <section class="section"><h2>代表案例</h2><p class="section-intro">S 级案例回答：我看到了什么、做了什么判断、结果在哪里被证实。</p><div class="case-grid">${cases}</div></section>
        <section class="section"><h2>持续工作的工程资产</h2><div class="asset-grid">${assets}</div></section>
        <section class="section"><h2>${esc(data.automationAdmission.title)}</h2><div class="panel"><div class="gate">${gate}</div><div class="warning"><strong>当前状态：${esc(data.automationAdmission.status)}</strong><br>${esc(data.automationAdmission.stopRule)}</div><p class="section-intro">${esc(data.automationAdmission.meaning)}</p></div></section>
        <section class="section"><h2>探索与边界</h2><div class="panel"><ul>${list(data.boundaries)}</ul></div></section>
        <section class="section"><h2>原话</h2><div class="panel">${(data.originalWords||[]).map(item=>`<blockquote>${esc(item.replace(/^>\s*/,''))}</blockquote>`).join('')}</div></section>`;
    }
    fetch('../../data/personal-engineering-thesis.json').then(response=>{if(!response.ok)throw new Error('personal engineering thesis data load failed');return response.json()}).then(render).catch(error=>{document.querySelector('#app').innerHTML=`<div class="panel">事实源读取失败：${esc(error.message)}</div>`});
  </script>
</body>
</html>
