<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reGeorge | Personal AI OS</title>
  <style>
    :root{--bg:#f7f4ed;--ink:#292521;--muted:#736b60;--line:#ddd5c9;--card:#fffdf9;--accent:#b46c4b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",sans-serif}.wrap{width:min(1120px,calc(100% - 30px));margin:auto;padding:24px 0 50px}header{display:flex;justify-content:space-between;align-items:center;padding:10px 0 30px;border-bottom:1px solid var(--line)}.brand{font:700 1.5rem Georgia,serif}.links{display:flex;gap:16px}.links a{color:var(--muted);text-decoration:none}.links a:hover{color:var(--accent)}.intro{margin:28px 0 34px;max-width:800px;color:var(--muted);line-height:1.9}.dimension{margin:28px 0 38px}.dimension-head{display:flex;align-items:baseline;gap:10px;margin-bottom:13px}.icon{font-size:1.6rem}.dimension-name{font:700 1.35rem Georgia,serif}.dimension-desc{color:var(--muted);font-size:.9rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{display:block;padding:18px;border:1px solid var(--line);border-radius:16px;background:var(--card);color:inherit;text-decoration:none;transition:transform .18s ease,box-shadow .18s ease}.card:hover{transform:translateY(-2px);box-shadow:0 10px 24px #6b4d2b12}.card h3{margin:0 0 8px;font:700 1.08rem/1.4 Georgia,"Songti SC",serif}.card p{margin:0;color:var(--muted);line-height:1.65;font-size:.92rem}.meta{display:block;margin-top:13px;color:var(--accent);font-size:.8rem}footer{padding-top:28px;color:var(--muted);font-size:.85rem;border-top:1px solid var(--line)}.empty{color:var(--muted);padding:30px 0}@media(max-width:600px){header{align-items:flex-start;gap:16px}.links{font-size:.86rem;flex-direction:column;gap:5px;text-align:right}}
  </style>
</head>
<body>
  <main class="wrap">
    <header><div class="brand">reGeorge</div><nav class="links"><a href="resume/index.html">简历</a><a href="https://github.com/regeorge" target="_blank" rel="noreferrer">GitHub</a></nav></header>
    <p class="intro">四维飞轮驱动：Ni 找主线 → 阅读输入认知，Te 建系统 → 工作输出价值，Fi 定尺度 → 生活验证假设，Se 接地气 → 乒乓锻炼身体直觉。四维互为燃料。</p>
    <div id="project-root"><div class="empty">正在读取项目事实……</div></div>
    <footer>© 2026 reGeorge · Personal AI OS</footer>
  </main>
  <script>
    const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    fetch('data/projects.json').then(r=>{if(!r.ok)throw new Error('projects data load failed');return r.json()}).then(projects=>{const groups=[];for(const project of projects){let group=groups.find(item=>item.name===project.dimension);if(!group){group={name:project.dimension,icon:project.icon,desc:project.dimensionDesc,items:[]};groups.push(group)}group.items.push(project)}document.querySelector('#project-root').innerHTML=groups.map(group=>`<section class="dimension"><div class="dimension-head"><span class="icon">${esc(group.icon)}</span><span class="dimension-name">${esc(group.name)}</span><span class="dimension-desc">${esc(group.desc)}</span></div><div class="grid">${group.items.map(project=>`<a class="card" href="${esc(project.page)}"><h3>${esc(project.title)}</h3><p>${esc(project.description)}</p><span class="meta">${esc(project.meta)}</span></a>`).join('')}</div></section>`).join('')}).catch(error=>{document.querySelector('#project-root').innerHTML=`<div class="empty">项目事实读取失败：${esc(error.message)}</div>`});
  </script>
</body>
</html>
