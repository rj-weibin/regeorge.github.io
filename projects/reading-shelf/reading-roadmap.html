<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阅读记录</title>
<style>
:root {
  --bg: #f5f4f0;
  --card: #fff;
  --border: #e5e3dc;
  --border2: #d0cec5;
  --text: #1a1916;
  --text2: #5a5750;
  --text3: #9a9790;
  --accent: #b16b43;
  --accent-light: rgba(177,107,67,.1);
  --r: 8px;
  --r2: 12px;
  --shadow: 0 4px 14px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* ── topbar ── */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.back-link{color:var(--text3);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px;flex-shrink:0}
.back-link:hover{color:var(--text)}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--text3);margin-left:2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-input{border:1px solid var(--border2);border-radius:var(--r);padding:5px 12px;font-size:13px;background:var(--bg);color:var(--text);width:160px}
.search-input:focus{outline:none;border-color:var(--accent);background:#fff}

/* ── layout ── */
.shell{display:flex;height:calc(100vh - 52px)}
.sidebar{width:200px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow-y:auto}
.main{flex:1;min-width:0;overflow-y:auto}
.right-panel{width:220px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* ── sidebar ── */
.sid-section{padding:10px 12px 4px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3)}
.cluster-item{padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;border-bottom:.5px solid var(--border)}
.cluster-item:hover{background:var(--bg)}
.cluster-item.active{border-left-color:var(--accent);background:var(--accent-light)}
.ci-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}
.ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ci-count{font-size:11px;color:var(--text3);margin-top:2px}
.ci-prog-row{display:flex;align-items:center;gap:5px;margin-top:4px}
.ci-prog-bg{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.ci-prog-fill{height:100%;border-radius:99px}
.ci-prog-txt{font-size:9px;color:var(--text3)}

/* ── main area ── */
.cluster-header{padding:18px 20px 12px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10}
.ch-top{display:flex;align-items:flex-start;gap:12px}
.ch-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ch-name{font-size:18px;font-weight:600;color:var(--text)}
.ch-desc{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.6}
.ch-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.ch-tag{font-size:11px;padding:2px 9px;border-radius:99px;background:var(--bg);border:1px solid var(--border2);color:var(--text3)}
.ch-stats{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--text3)}
.ch-stat strong{color:var(--text2);font-weight:600}

.books-area{padding:16px 20px}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.book-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.bc-cover{height:6px;flex-shrink:0}
.bc-body{padding:12px}
.bc-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bc-author{font-size:11px;color:var(--text3);margin-bottom:8px}
.bc-thesis{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.bc-thesis.empty{color:var(--text3);font-style:italic}
.bc-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bc-status{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.bc-status.done{background:#eaf3de;color:#27500a}
.bc-status.reading{background:#e6f1fb;color:#0c447c}
.bc-status.unread{background:var(--bg);color:var(--text3);border:1px solid var(--border2)}
.bc-notes{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.bc-study-btn{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;text-decoration:none;transition:all .12s;white-space:nowrap}
.bc-study-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.bc-study-btn.disabled{opacity:.4;pointer-events:none}

/* ── empty ── */
.empty-hint{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px}

/* ── right panel ── */
.rp-section{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.rp-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:var(--bg);border-radius:var(--r);padding:8px;text-align:center}
.stat-n{font-size:22px;font-weight:600;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:1px}
.global-prog-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.gp-bg{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.gp-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s}
.gp-txt{font-size:11px;color:var(--text3);white-space:nowrap}

.prompt-section{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.prompt-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.prompt-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.prompt-text{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.copy-btn{font-size:11px;padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:#fff;color:var(--text2);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.copy-btn.copied{background:#27500a;color:#fff;border-color:#27500a}

/* ── global prog bar ── */
.global-bar{height:3px;background:var(--border);position:fixed;top:52px;left:0;right:0;z-index:99}
.global-bar-fill{height:100%;background:var(--accent);transition:width .5s}

/* ── mobile hamburger ── */
.hamburger{display:none;flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px;color:var(--text3);margin-left:-4px}
.hamburger:hover{color:var(--text)}
.hamburger svg{display:block}

/* ── sidebar overlay ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99;opacity:0;transition:opacity .2s}
.sidebar-overlay.open{opacity:1}

/* ── mobile stats area ── */
.mobile-stats{display:none}

/* ── responsive ── */
@media(max-width:768px){
  .hamburger{display:flex;align-items:center;justify-content:center}

  .sidebar-overlay{display:block;pointer-events:none}
  .sidebar-overlay.open{pointer-events:auto}

  .sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:100;width:240px;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 20px rgba(0,0,0,.12);max-height:none}
  .sidebar.open{transform:translateX(0)}

  .right-panel{display:block;position:fixed;bottom:0;left:0;right:0;z-index:90;background:#fff;border-top:2px solid var(--accent);border-radius:16px 16px 0 0;max-height:45vh;overflow-y:auto;width:100%;box-shadow:0 -4px 24px rgba(0,0,0,.1);transition:transform .25s ease;transform:translateY(100%)}
  .right-panel.open{transform:translateY(0)}
  .right-panel-toggle{display:flex;position:fixed;bottom:16px;right:16px;z-index:91;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(177,107,67,.35);border:none}
  .right-panel-toggle:active{transform:scale(.94)}

  .main{width:100%;overflow-y:auto}

  .mobile-stats{display:block;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
  .ms-section{padding:14px 0}
  .ms-section+.ms-section{border-top:1px solid var(--border)}
  .ms-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:8px}
  .ms-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .ms-stat-card{background:#fff;border-radius:var(--r);padding:8px 4px;text-align:center;border:1px solid var(--border)}
  .ms-stat-n{font-size:18px;font-weight:600;color:var(--text)}
  .ms-stat-l{font-size:9px;color:var(--text3);margin-top:1px}
  .ms-prog-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .ms-prog-bg{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
  .ms-prog-fill{height:100%;border-radius:99px;background:var(--accent)}
  .ms-prog-txt{font-size:11px;color:var(--text3);white-space:nowrap}

  .topbar{padding:0 10px;gap:8px}
  .topbar-title{font-size:13px}
  .topbar-sub{display:none}
  .topbar-right{flex:1;min-width:0}
  .search-input{width:100%;font-size:13px}

  .cluster-header{padding:14px 12px 10px}
  .ch-name{font-size:16px}
  .ch-desc{font-size:12px}
  .ch-stats{gap:10px;font-size:11px}
  .books-area{padding:12px}
  .books-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .bc-body{padding:10px}
  .bc-title{font-size:12px}
  .bc-author{font-size:10px}
  .bc-thesis{font-size:11px;-webkit-line-clamp:2}

  .mobile-prompts{display:block;padding:14px 16px;background:var(--bg)}
  .prompt-card{background:#fff}
}
</style>
</head>
<body>

<div class="topbar">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="打开主题列表">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <a class="back-link" href="../../index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    首页
  </a>
  <span style="color:var(--border2)">|</span>
  <span class="topbar-title">阅读记录</span>
  <span class="topbar-sub" id="topbarSub"></span>
  <div class="topbar-right">
    <input class="search-input" type="text" id="searchInput" placeholder="搜索…" oninput="onSearch()">
  </div>
</div>

<div class="global-bar"><div class="global-bar-fill" id="globalBarFill"></div></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<button class="right-panel-toggle" id="rightPanelToggle" onclick="toggleRightPanel()" aria-label="AI探索提示词">💡</button>

<div class="shell">
  <div class="sidebar" id="sidebar"></div>

  <div class="main" id="mainArea">
    <div class="mobile-stats" id="mobileStats"></div>
    <div class="empty-hint">← 从左侧选择一个主题</div>
  </div>

  <div class="right-panel">
    <div class="rp-section">
      <div class="rp-label">整体进度</div>
      <div class="stat-grid" id="statGrid"></div>
      <div class="global-prog-row">
        <div class="gp-bg"><div class="gp-fill" id="globalProgFill" style="width:0%"></div></div>
        <span class="gp-txt" id="globalProgTxt">0%</span>
      </div>
    </div>
    <div class="prompt-section" id="promptSection">
      <div class="rp-label">AI 探索提示词</div>
      <div style="font-size:12px;color:var(--text3)">选择左侧主题后，这里会生成可复制的提示词</div>
    </div>
  </div>
</div>

<script src="../../data/books-data.js"></script>
<script>
// ── 主题聚类配置 ──────────────────────────────────────────
// 每个 cluster 有颜色、关键词（匹配书名/作者/edition/detail）
var CLUSTERS = [
  {
    id: 'thinking',
    name: '思维与决策',
    color: '#378ADD',
    desc: '如何更清晰地思考、识别偏差、做出更好的判断。',
    keywords: ['清晰思考','思考','决策','快与慢','认知','理性','注意力','深度工作','专注'],
    prompts: [
      { label: '整体连接', text: '我读过《清晰思考》《思考快与慢》《深度工作》《注意力危机》。请帮我梳理这几本书在"如何更好地思考和决策"这个主题上的核心分歧与互补之处，给出一个整合框架。' },
      { label: '下一本推荐', text: '我读过《清晰思考》《思考快与慢》。我对决策框架和认知偏差很感兴趣。请推荐 3 本进阶书目，说明与我已读书目的关联。' },
      {"label":"发散探索","text":"从清晰思考的划线中我看到：机会成本的隐性定价、二元思维的陷阱、习惯与环境的重塑。请帮我把这3个点串联成一个\"如何从自动驾驶切换到清晰思考\"的三步实操框架。"},
      {"label":"跨界碰撞","text":"我读过《清晰思考》《纳瓦尔宝典》。清晰思考的\"HALT决策保护\"(饥饿/愤怒/孤独/疲倦)和纳瓦尔的\"思考时间优先\"可以怎么整合成一个统一的\"防冲动\"决策系统？"},
    ]
  },
  {
    id: 'wealth',
    name: '财富与投资',
    color: '#639922',
    desc: '金钱的本质、投资哲学、价值观与财富积累的底层逻辑。',
    keywords: ['金钱','投资','财富','段永平','巴菲特','芒格','金融','经济','复利','小狗钱钱','股票','小岛','豪泽尔','心理学'],
    prompts: [
      { label: '投资哲学对比', text: '我读过段永平投资问答录、《金钱心理学》、穷查理宝典、巴菲特致股东的信。请对比这几位投资者/作者在"什么是好的投资"上的核心观点差异，给出综合判断。' },
      { label: '财富观升级', text: '我目前的财富观受段永平影响较大（本分、长期、不懂不碰）。请给我推荐能挑战或补充这个框架的书籍，并说明为什么。' },
      {"label":"发散探索","text":"从纳瓦尔宝典到段永平到金钱心理学，我看到一条线索：财富不只是赚钱技巧，而如何看待自己和世界的关系。请帮我梳理这三本书的\"财富观\"从哪个角度是最深层的共鸣，哪个角度又有根本分歧。"},
      {"label":"跨界碰撞","text":"金钱心理学的\"尾部事件\" x 一如既往的\"不变人性\" —— 我在金钱心理学划了大量关于人性弱点的内容。怎样用\"人性不变\"这个底层定律来设计一个防愚蠢的投资系统？"},
      {"label":"商业拆解","text":"我从马化腾的早期经验中提炼了一个商业公式：用户体验(弓) × 流量杠杆(弦) × 鱼尾机会(箭)。请帮我：用这个框架分别分析微信、支付宝、抖音这三个产品的成功路径——它们的弓弦箭各是什么？顺序是否成立？"},

    ]
  },
  {
    id: 'self',
    name: '自我与成长',
    color: '#D4537E',
    desc: '内在驱动、习惯系统、效能与个人发展的底层机制。',
    keywords: ['复利','习惯','优秀','深度','成长','自我','人生','启发','纽波特','每周工作','时间','工作4小时','驱动'],
    prompts: [
      { label: '行动系统整合', text: '我读过《复利效应》《优秀到不能被忽视》《深度工作》《每周工作4小时》。这些书在"如何让努力真正有效"上各自给出了什么答案？哪些观点互相矛盾？' },
      { label: '个人成长下一步', text: '我对深度工作和复利积累很认同，但执行上容易断。请给我推荐能解决"知道但做不到"问题的书，解释原因。' },
      {"label":"发散探索","text":"心流的划线中我看到\"挑战-技能平衡\"和\"即时反馈\"。请帮我：如何把这个模型用到我的日常工作中去？设计一个能让普通工作变成心流体验的操作清单。"},

    ]
  },
  {
    id: 'philosophy',

    color: '#7F77DD',

    prompts: [

// ── 状态 ──────────────────────────────────────────────────
var allBooks = (window.READING_SHELF_BOOKS || []).filter(dedup);
var curClusterId = null;
var searchQ = '';

function dedup(b, idx, arr) {
  // 去重：同 title 只保留第一个
  return arr.findIndex(function(x){ return x.title === b.title; }) === idx;
}

function getProgress(b) {
  return Math.max(0, Math.min(100, Number(b.progress) || 0));
}

function getStatus(b) {
  var p = getProgress(b);
  if (p >= 100) return 'done';
  if (p > 0) return 'reading';
  return 'unread';
}

function statusLabel(s) {
  return {done:'已读完', reading:'在读中', unread:'未读'}[s] || '未读';
}

// 给每本书打 cluster 标签
function tagBook(book) {
  var text = [book.title, book.author, book.edition, (book.detail||{}).thesis].filter(Boolean).join(' ');
  var matched = [];
  CLUSTERS.forEach(function(c) {
    var hit = c.keywords.some(function(kw){ return text.indexOf(kw) >= 0; });
    if (hit) matched.push(c.id);
  });
  return matched.length ? matched : ['_other'];
}

function getBooksForCluster(cid) {
  return allBooks.filter(function(b){ return tagBook(b).indexOf(cid) >= 0; });
}

function applySearch(books) {
  if (!searchQ) return books;
  var q = searchQ.toLowerCase();
  return books.filter(function(b){
    return (b.title||'').toLowerCase().indexOf(q) >= 0 ||
           (b.author||'').toLowerCase().indexOf(q) >= 0;
  });
}

// ── 统计 ──────────────────────────────────────────────────
function renderStats() {
  var done = 0, reading = 0, total = allBooks.length;
  allBooks.forEach(function(b){
    var s = getStatus(b);
    if (s === 'done') done++;
    if (s === 'reading') reading++;
  });
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('statGrid').innerHTML =
    '<div class="stat-card"><div class="stat-n">'+total+'</div><div class="stat-l">总计</div></div>'+
    '<div class="stat-card"><div class="stat-n">'+done+'</div><div class="stat-l">已读</div></div>'+
    '<div class="stat-card"><div class="stat-n">'+reading+'</div><div class="stat-l">在读</div></div>'+
    '<div class="stat-card"><div class="stat-n">'+pct+'%</div><div class="stat-l">完成率</div></div>';
  document.getElementById('globalProgFill').style.width = pct + '%';
  document.getElementById('globalBarFill').style.width = pct + '%';
  document.getElementById('globalProgTxt').textContent = pct + '%';
  document.getElementById('topbarSub').textContent = '共 ' + total + ' 本 · ' + done + ' 本已读';
}

// ── sidebar ──────────────────────────────────────────────
function renderSidebar() {
  var html = '<div class="sid-section">主题分组</div>';
  CLUSTERS.forEach(function(c) {
    var books = getBooksForCluster(c.id);
    if (!books.length) return;
    var done = books.filter(function(b){ return getStatus(b) === 'done'; }).length;
    var pct = Math.round(done / books.length * 100);
    var isActive = c.id === curClusterId;
    html += '<div class="cluster-item'+(isActive?' active':'')+'" onclick="selectCluster(\''+c.id+'\')">' +
      '<div class="ci-name"><span class="ci-dot" style="background:'+c.color+'"></span>'+esc(c.name)+'</div>'+
      '<div class="ci-count">'+books.length+' 本 · '+done+' 已读</div>'+
      '<div class="ci-prog-row"><div class="ci-prog-bg"><div class="ci-prog-fill" style="width:'+pct+'%;background:'+c.color+'"></div></div>'+
      '<span class="ci-prog-txt">'+pct+'%</span></div>'+
      '</div>';
  });
  document.getElementById('sidebar').innerHTML = html;
}

// ── main area ─────────────────────────────────────────────
function renderMain() {
  var el = document.getElementById('mainArea');
  if (!curClusterId) {
    el.innerHTML = '<div class="empty-hint">← 从左侧选择一个主题</div>';
    return;
  }
  var c = CLUSTERS.find(function(x){ return x.id === curClusterId; });
  if (!c) return;
  var books = applySearch(getBooksForCluster(c.id));
  var done = books.filter(function(b){ return getStatus(b) === 'done'; }).length;
  var reading = books.filter(function(b){ return getStatus(b) === 'reading'; }).length;
  var hasNotes = books.filter(function(b){ return (b.notes||0) > 0; }).length;

  var headerHtml = '<div class="cluster-header">'+
    '<div class="ch-top"><div class="ch-dot" style="background:'+c.color+'"></div>'+
    '<div><div class="ch-name">'+esc(c.name)+'</div>'+
    '<div class="ch-desc">'+esc(c.desc)+'</div></div></div>'+
    '<div class="ch-stats">'+
    '<span><strong>'+books.length+'</strong> 本书</span>'+
    '<span><strong>'+done+'</strong> 已读</span>'+
    (reading ? '<span><strong>'+reading+'</strong> 在读</span>' : '')+
    (hasNotes ? '<span><strong>'+hasNotes+'</strong> 本有笔记</span>' : '')+
    '</div></div>';

  var cardsHtml = '';
  if (!books.length) {
    cardsHtml = '<div class="empty-hint">没有匹配的书籍</div>';
  } else {
    cardsHtml = '<div class="books-area"><div class="books-grid">';
    // 排序：有笔记的优先，然后按进度
    var sorted = books.slice().sort(function(a,b){
      var na = a.notes||0, nb = b.notes||0;
      if (na !== nb) return nb - na;
      return getProgress(b) - getProgress(a);
    });
    sorted.forEach(function(b){
      var s = getStatus(b);
      var prog = getProgress(b);
      var thesis = (b.detail&&b.detail.thesis&&b.detail.thesis!=='待补') ? b.detail.thesis : '';
      var hasStudy = (b.notes||0) > 0 || thesis;
      var studyHref = 'reading-study.html?bookId=' + encodeURIComponent(b.bookId || b.title);
      var colorStart = (b.theme && b.theme[0]) ? b.theme[0] : '#ccc';
      var colorEnd = (b.theme && b.theme[1]) ? b.theme[1] : '#999';
      cardsHtml += '<div class="book-card">'+
        '<div class="bc-cover" style="background:linear-gradient(90deg,'+colorStart+','+colorEnd+')"></div>'+
        '<div class="bc-body">'+
        '<div class="bc-title">'+esc(b.title)+'</div>'+
        '<div class="bc-author">'+esc(b.author||'')+'</div>'+
        (thesis ? '<div class="bc-thesis">'+esc(thesis)+'</div>' : '<div class="bc-thesis empty">暂无核心论点记录</div>')+
        '<div class="bc-footer">'+
        '<span class="bc-status '+s+'">'+statusLabel(s)+'</span>'+
        ((b.notes||0)>0 ? '<span class="bc-notes">📝 '+b.notes+' 张笔记</span>' : '')+
        '<a class="bc-study-btn'+(hasStudy?'':' disabled')+'" href="'+(hasStudy?studyHref:'#')+'">记录 →</a>'+
        '</div></div></div>';
    });
    cardsHtml += '</div></div>';
  }
  el.innerHTML = headerHtml + cardsHtml;
}

// ── right panel prompts ───────────────────────────────────
function renderPrompts() {
  var el = document.getElementById('promptSection');
  var c = curClusterId ? CLUSTERS.find(function(x){ return x.id === curClusterId; }) : null;
  if (!c || !c.prompts || !c.prompts.length) {
    el.innerHTML = '<div class="rp-label">AI 探索提示词</div>'+
      '<div style="font-size:12px;color:var(--text3)">选择主题后会出现可复制的提示词</div>';
    return;
  }
  var books = getBooksForCluster(c.id).filter(function(b){ return getStatus(b) !== 'unread'; });
  var bookList = books.map(function(b){ return '《'+b.title+'》'; }).join('、');

  var html = '<div class="rp-label">AI 探索提示词</div>';
  c.prompts.forEach(function(p, i){
    var fullText = p.text;
    // 动态替换书单占位
    if (books.length > 0 && fullText.indexOf('我读过') >= 0) {
      // 已内嵌书单，保持原样
    }
    html += '<div class="prompt-card">'+
      '<div class="prompt-label">'+esc(p.label)+'</div>'+
      '<div class="prompt-text">'+esc(fullText.slice(0,100))+(fullText.length>100?'…':'')+'</div>'+
      '<button class="copy-btn" onclick="copyPrompt(this,\''+esc(fullText).replace(/'/g,'&#39;')+'\')">'+
      '📋 复制提示词</button>'+
      '</div>';
  });

  // 动态生成一个基于当前主题已读书单的提示词
  if (books.length >= 2) {
    var auto = '我在"'+c.name+'"方向读过：'+bookList+'。请帮我梳理这些书的核心共同主题，找出最深刻的洞见，并推荐 2 本能深化理解的进阶书目。';
    html += '<div class="prompt-card">'+
      '<div class="prompt-label" style="color:var(--accent)">✦ 动态生成</div>'+
      '<div class="prompt-text">基于你在此主题下的已读书单自动生成</div>'+
      '<button class="copy-btn" onclick="copyPrompt(this,\''+auto.replace(/'/g,'&#39;')+'\')">'+
      '📋 复制我的书单提示词</button>'+
      '</div>';
  }

  el.innerHTML = html;
}

// ── sidebar toggle (mobile) ──────────────────────────────
function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebarOverlay');
  var open = sb.classList.toggle('open');
  ov.classList.toggle('open');
  document.body.style.overflow = open ? 'hidden' : '';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');

    '<div class="ms-stat-card"><div class="ms-stat-n">'+total+'</div><div class="ms-stat-l">总计</div></div>'+
    '<div class="ms-stat-card"><div class="ms-stat-n">'+done+'</div><div class="ms-stat-l">已读</div></div>'+
    '<div class="ms-stat-card"><div class="ms-stat-n">'+reading+'</div><div class="ms-stat-l">在读</div></div>'+
    '<div class="ms-stat-card"><div class="ms-stat-n">'+pct+'%</div><div class="ms-stat-l">完成率</div></div>'+
    '</div>'+
    '<div class="ms-prog-row">'+
    '<div class="ms-prog-bg"><div class="ms-prog-fill" style="width:'+pct+'%"></div></div>'+

}

function renderMobilePrompts() {

  var el = document.getElementById('mobileStats');
  if (!el || window.innerWidth > 768) return;

  var existing = el.querySelector('.ms-prompts');

  var html = '<div class="ms-section ms-prompts">'+
    '<div class="ms-label">AI 探索提示词</div>';

    var fullText = p.text;

  if (books.length >= 2) {
    var auto = '我在"'+c.name+'"方向读过：'+bookList+'。请帮我梳理这些书的核心共同主题，找出最深刻的洞见，并推荐 2 本能深化理解的进阶书目。';
    html += '<div class="prompt-card" style="margin-bottom:0">'+
      '<div class="prompt-label" style="color:var(--accent)">✦ 动态生成</div>'+
      '<div class="prompt-text">基于你在此主题下的已读书单自动生成</div>'+
      '<button class="copy-btn" onclick="copyPrompt(this,\''+auto.replace(/'/g,'&#39;')+'\')">'+
      '📋 复制我的书单提示词</button></div>';
  }
  html += '</div>';
  el.insertAdjacentHTML('beforeend', html);
}
function selectCluster(id) {
  curClusterId = id;
  closeSidebar();
  render();
}

function onSearch() {
  searchQ = document.getElementById('searchInput').value.trim();
  render();
}

function copyPrompt(btn, text) {
  // HTML entities back to real text
  var tmp = document.createElement('textarea');
  tmp.innerHTML = text;
  var decoded = tmp.value;
  navigator.clipboard.writeText(decoded).then(function(){
    btn.classList.add('copied');
    btn.textContent = '✓ 已复制';
    setTimeout(function(){ btn.classList.remove('copied'); btn.textContent = '📋 复制提示词'; }, 2000);
  }).catch(function(){
    // fallback
    var ta = document.createElement('textarea');
    ta.value = decoded;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    btn.textContent = '✓ 已复制';
    setTimeout(function(){ btn.textContent = '📋 复制提示词'; }, 2000);
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  renderStats();
  renderSidebar();
  renderMain();
  renderPrompts();
  renderMobileStats();
  renderMobilePrompts();
}

// 默认选中第一个有书的 cluster
function init() {
  for (var i = 0; i < CLUSTERS.length; i++) {
    if (getBooksForCluster(CLUSTERS[i].id).length > 0) {
      curClusterId = CLUSTERS[i].id;
      break;
    }
  }
  render();
}

init();

function toggleRightPanel() {
  var panel = document.querySelector('.right-panel');
  if (panel) panel.classList.toggle('open');
}
